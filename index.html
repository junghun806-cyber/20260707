<html lang="ko">
<head>

<style>
  :root {
    /* -- Spotify-inspired design tokens -- */
    --bg-base: #121212;
    --bg-surface: #181818;
    --bg-elevated: #1f1f1f;
    --bg-card: #252525;
    --bg-card-alt: #272727;

    --text-base: #ffffff;
    --text-bright: #fdfdfd;
    --text-secondary: #b3b3b3;

    --accent-green: #1ed760;
    --accent-green-border: #1db954;

    --negative: #f3727f;
    --warning: #ffa42b;
    --announcement: #539df5;

    --border-light: #7c7c7c;

    --shadow-medium: rgba(0, 0, 0, 0.3) 0px 8px 8px;
    --shadow-heavy: rgba(0, 0, 0, 0.5) 0px 8px 24px;

    --radius-badge: 2px;
    --radius-card: 8px;
    --radius-panel: 12px;
    --radius-pill: 9999px;

    --font: "SpotifyMixUI", "Helvetica Neue", Helvetica, Arial, "Malgun Gothic", "Pretendard", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-base);
    color: var(--text-base);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  /* -- Top brand row -- */
  .topbar {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .brand-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-green);
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--text-base);
  }

  main {
    width: 100%;
    max-width: 640px;
  }

  /* -- Intro -- */
  .intro { margin-bottom: 20px; }

  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin: 0 0 6px;
  }

  h1.title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    margin: 0 0 8px;
    color: var(--text-bright);
  }

  h2.feature-heading {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
    margin: 0;
    color: var(--text-bright);
  }

  .subtitle {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    margin: 0;
  }

  /* -- Cards -- */
  .card {
    background: var(--bg-surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-medium);
    padding: 20px;
    margin-bottom: 20px;
  }

  .section-head {
    margin-bottom: 16px;
  }

  /* -- Controls -- */
  .controls {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
  }

  select.pill-select {
    height: 44px;
    padding: 0 20px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--bg-elevated);
    color: var(--text-base);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    min-width: 130px;
    box-shadow: rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset;
  }
  select.pill-select:focus { outline: none; box-shadow: rgb(18,18,18) 0px 1px 0px, rgb(255,255,255) 0px 0px 0px 1px inset; }

  button.btn-green {
    height: 44px;
    padding: 0 34px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--accent-green);
    color: #000000;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  button.btn-green:hover { transform: scale(1.04); background: #21e065; }
  button.btn-green:active { transform: scale(0.98); }
  button.btn-green:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* -- Results -- */
  #results {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-set {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-card);
    padding: 12px 16px;
    flex-wrap: wrap;
    transition: background 0.15s ease;
  }
  .result-set:hover { background: var(--bg-card-alt); }

  .set-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    width: 56px;
    flex-shrink: 0;
  }

  .balls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Balls stay circular -- Spotify's own geometry already favors
     circles (play buttons, avatars), so no exception needed here.
     Colors are the official Korean Lotto number-range colors,
     kept as functional information rather than brand color. */
  .ball {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #121212;
    box-shadow: var(--shadow-medium);
    opacity: 0;
    transform: scale(0.5);
    animation: pop 0.35s ease forwards;
  }
  @keyframes pop { to { opacity: 1; transform: scale(1); } }

  .c1 { background: #fbc400; }
  .c2 { background: #69c8f2; }
  .c3 { background: #ff7272; }
  .c4 { background: #aaaaaa; }
  .c5 { background: #b0d840; }

  /* -- History -- */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 440px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }

  .history-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-card);
    flex-wrap: wrap;
    transition: background 0.15s ease;
  }
  .history-row:hover { background: var(--bg-elevated); }

  .history-meta { width: 84px; flex-shrink: 0; }

  .history-round {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-base);
  }

  .history-date {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
  }

  .history-balls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .mini-ball {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 11px;
    color: #121212;
    flex-shrink: 0;
  }

  .history-sep {
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 400;
  }

  .mini-ball.bonus {
    background: var(--bg-elevated);
    color: var(--text-base);
    box-shadow: rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset;
  }

  /* -- Footnote -- */
  .footnote {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.6;
  }
  .footnote a { color: var(--announcement); }

  @media (max-width: 480px) {
    .controls { align-items: stretch; }
    button.btn-green { width: 100%; }
    select.pill-select { width: 100%; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <span class="brand-dot"></span>
    <span class="brand-name">Lotto</span>
  </div>

  <main>
    <section class="intro">
      <p class="eyebrow">Lotto 6/45</p>
      <h1 class="title">로또 번호 추첨기</h1>
      <p class="subtitle">1부터 45까지, 중복 없이 뽑은 6개의 숫자.</p>
    </section>

    <section class="card">
      <div class="controls">
        <div class="field">
          <label class="field-label" for="count">게임 수</label>
          <select id="count" class="pill-select">
            <option value="1">1게임</option>
            <option value="2">2게임</option>
            <option value="3">3게임</option>
            <option value="4">4게임</option>
            <option value="5">5게임</option>
          </select>
        </div>
        <button id="drawBtn" class="btn-green">번호 추첨</button>
      </div>
      <div id="results"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <p class="eyebrow">History</p>
        <h2 class="feature-heading">역대 당첨번호</h2>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

    <p class="footnote">숫자 색상은 국내 로또 공식 번호대(1–10 / 11–20 / 21–30 / 31–40 / 41–45) 색상을 따릅니다.<br>역대 당첨번호는 1231회(2026.07.04)부터 1210회(2026.02.07)까지이며, 정확한 당첨 결과는 <a href="https://www.dhlottery.co.kr" target="_blank" rel="noopener">동행복권 공식 홈페이지</a>에서 최종 확인하시기 바랍니다.</p>
  </main>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://ufwrgpdyeofjudjavemq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmd3JncGR5ZW9manVkamF2ZW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTUwOTAsImV4cCI6MjA5ODk3MTA5MH0.z9afK0f-lvBbHdoPBSKF5-Kf-38dzEySLYWdOzc_XXE';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function saveDraw(sets) {
    const batchId = crypto.randomUUID();
    const rows = sets.map((numbers, i) => ({
      batch_id: batchId,
      game_index: i + 1,
      numbers,
    }));
    const { error } = await supabase.from('lotto_draws').insert(rows);
    if (error) console.error('Supabase insert failed:', error.message);
  }

  const btn = document.getElementById('drawBtn');
  const resultsEl = document.getElementById('results');
  const countSel = document.getElementById('count');

  function colorClass(n) {
    if (n <= 10) return 'c1';
    if (n <= 20) return 'c2';
    if (n <= 30) return 'c3';
    if (n <= 40) return 'c4';
    return 'c5';
  }

  function drawOneSet() {
    const pool = Array.from({ length: 45 }, (_, i) => i + 1);
    const picked = [];
    for (let i = 0; i < 6; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      picked.push(pool.splice(idx, 1)[0]);
    }
    return picked.sort((a, b) => a - b);
  }

  function render(sets) {
    resultsEl.innerHTML = '';
    sets.forEach((set, setIdx) => {
      const row = document.createElement('div');
      row.className = 'result-set';

      const label = document.createElement('span');
      label.className = 'set-label';
      label.textContent = `게임 ${setIdx + 1}`;
      row.appendChild(label);

      const ballsWrap = document.createElement('div');
      ballsWrap.className = 'balls';
      set.forEach((n, i) => {
        const ball = document.createElement('div');
        ball.className = `ball ${colorClass(n)}`;
        ball.textContent = n;
        ball.style.animationDelay = `${(setIdx * 6 + i) * 0.06}s`;
        ballsWrap.appendChild(ball);
      });
      row.appendChild(ballsWrap);
      resultsEl.appendChild(row);
    });
  }

  function draw() {
    btn.disabled = true;
    const count = parseInt(countSel.value, 10);
    const sets = Array.from({ length: count }, drawOneSet);
    render(sets);
    saveDraw(sets);
    if (typeof gtag === 'function') {
      gtag('event', 'draw_click', { game_count: count });
    }
    setTimeout(() => { btn.disabled = false; }, 300);
  }

  btn.addEventListener('click', draw);
  draw();

  // 역대 당첨번호 (1210회~1231회). 동행복권 공식 API가 자동조회를 차단해
  // 공개 미러 두 곳(lotto.ysw.kr, lottis.kr)을 교차 검증해 수집한 값입니다.
  const historyData = [
    { round: 1231, date: '2026.07.04', numbers: [4, 13, 14, 18, 31, 38], bonus: 15 },
    { round: 1230, date: '2026.06.27', numbers: [3, 8, 9, 22, 28, 42], bonus: 45 },
    { round: 1229, date: '2026.06.20', numbers: [12, 13, 29, 34, 37, 42], bonus: 16 },
    { round: 1228, date: '2026.06.13', numbers: [24, 29, 30, 31, 35, 44], bonus: 1 },
    { round: 1227, date: '2026.06.06', numbers: [1, 14, 16, 34, 41, 44], bonus: 13 },
    { round: 1226, date: '2026.05.30', numbers: [4, 6, 13, 17, 26, 28], bonus: 41 },
    { round: 1225, date: '2026.05.23', numbers: [8, 9, 19, 25, 41, 42], bonus: 33 },
    { round: 1224, date: '2026.05.16', numbers: [9, 18, 21, 27, 44, 45], bonus: 28 },
    { round: 1223, date: '2026.05.09', numbers: [16, 18, 20, 32, 33, 39], bonus: 26 },
    { round: 1222, date: '2026.05.02', numbers: [4, 11, 17, 22, 32, 41], bonus: 34 },
    { round: 1221, date: '2026.04.25', numbers: [6, 13, 18, 28, 30, 36], bonus: 9 },
    { round: 1220, date: '2026.04.18', numbers: [2, 22, 25, 28, 34, 43], bonus: 16 },
    { round: 1219, date: '2026.04.11', numbers: [1, 2, 15, 28, 39, 45], bonus: 31 },
    { round: 1218, date: '2026.04.04', numbers: [3, 28, 31, 32, 42, 45], bonus: 25 },
    { round: 1217, date: '2026.03.28', numbers: [8, 10, 15, 20, 29, 31], bonus: 41 },
    { round: 1216, date: '2026.03.21', numbers: [3, 10, 14, 15, 23, 24], bonus: 25 },
    { round: 1215, date: '2026.03.14', numbers: [13, 15, 19, 21, 44, 45], bonus: 39 },
    { round: 1214, date: '2026.03.07', numbers: [10, 15, 19, 27, 30, 33], bonus: 14 },
    { round: 1213, date: '2026.02.28', numbers: [5, 11, 25, 27, 36, 38], bonus: 2 },
    { round: 1212, date: '2026.02.21', numbers: [5, 8, 25, 31, 41, 44], bonus: 45 },
    { round: 1211, date: '2026.02.14', numbers: [23, 26, 27, 35, 38, 40], bonus: 10 },
    { round: 1210, date: '2026.02.07', numbers: [1, 7, 9, 17, 27, 38], bonus: 31 },
  ];

  function renderHistory() {
    const listEl = document.getElementById('historyList');
    historyData.forEach(entry => {
      const row = document.createElement('div');
      row.className = 'history-row';

      const meta = document.createElement('div');
      meta.className = 'history-meta';
      meta.innerHTML = `<div class="history-round">${entry.round}회</div><div class="history-date">${entry.date}</div>`;
      row.appendChild(meta);

      const ballsWrap = document.createElement('div');
      ballsWrap.className = 'history-balls';
      entry.numbers.forEach(n => {
        const ball = document.createElement('div');
        ball.className = `mini-ball ${colorClass(n)}`;
        ball.textContent = n;
        ballsWrap.appendChild(ball);
      });

      const sep = document.createElement('span');
      sep.className = 'history-sep';
      sep.textContent = '+';
      ballsWrap.appendChild(sep);

      const bonusBall = document.createElement('div');
      bonusBall.className = `mini-ball bonus`;
      bonusBall.textContent = entry.bonus;
      ballsWrap.appendChild(bonusBall);

      row.appendChild(ballsWrap);
      listEl.appendChild(row);
    });
  }

  renderHistory();
</script>
</body>
</html>
